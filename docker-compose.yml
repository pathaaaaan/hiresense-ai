services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hiresense
      POSTGRES_PASSWORD: hiresense
      POSTGRES_DB: hiresense
    ports:
      - "5432:5432"
    volumes:
      - hiresense_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresense"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hiresense:hiresense@db:5432/hiresense
      JWT_SECRET: dev-secret-change-me
      GEMINI_API_KEY: replace-with-your-gemini-api-key
      GEMINI_MODEL: gemini-2.5-flash
      CORS_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
    ports:
      - "8000:8000"

volumes:
  hiresense_db_data:
